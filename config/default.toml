# superhot-tty v0.5 configuration file.
#
# Place at: ~/.config/SH-tty/config.toml (XDG) or /etc/SH-tty/config.toml (system-wide)
#
# Все биндинги и настройки задаются здесь. Нет захардкоденных значений.
#
# === Privilege Separation Model ===
# При запуске от root процесс делает следующее:
#   1. Открывает DRM master fd и /dev/input/event* (нужен root)
#   2. fork() — ребёнок drop к "superhot-tty" user, показывает login screen
#      (непривилегированный — не может читать /etc/shadow, не имеет IPC)
#   3. Родитель (root) принимает credentials через socketpair, делает PAM auth
#   4. При успехе — родитель drop к вошедшему пользователю, запускает WM + IPC
#   5. IPC сокет создаётся с правами 0600 + SO_PEERCRED проверкой —
#      только вошедший пользователь может отправлять команды
#
# Системный пользователь "superhot-tty" создаётся install.sh.
# Он состоит в группах: video, input, render, tty (но НЕ shadow).

[general]
shell = "zsh"
font = "Lat2-Terminus16"
font_size = 16
gap = 4
border = 1
outer_padding = 4
status_bar_height = 24
framerate = 60
glitch_intensity = 0.15
workspace_count = 10  # 1..9 + 0=10

[theme]
bg = "#0A0716"
tile_bg_inactive = "#120E24"
tile_bg_active = "#0F0A1E"
border_inactive = "#3A2D5C"
border_active = "#FF2E97"
border_x11 = "#00F0FF"
fg_default = "#E6E1F0"
fg_dim = "#7A6F96"
accent_magenta = "#FF2E97"
accent_cyan = "#00F0FF"
popup_bg = "#140B2E"
popup_border = "#FF2E97"
error = "#FF4D4D"

# ===== Login screen =====
[login]
# Title — large center text (like SHMCD "MORE"). Empty → use language default.
title = ""
subtitle = ""
language = "en"            # "en" → "MORE" / "SUPERHOT TTY", "ru" → "БОЛЬШЕ" / "СУПЕРХОТ TTY"
show_clock = true
show_hint = true
pam_service = "login"
auto_start_session = true
# title_color = "#FF2E97"  # optional override (default = theme.accent_magenta)
# title_font = ""          # optional override (default = general.font)

# ===== Workspaces =====
# 10 workspaces (1..9 + 0=10). Каждый может иметь имя и on_init команду.
[[workspaces]]
n = 1
name = "MAIN"

[[workspaces]]
n = 2
name = "WEB"

[[workspaces]]
n = 3
name = "DEV"

[[workspaces]]
n = 4
name = "CHAT"

[[workspaces]]
n = 5
name = "MEDIA"

[[workspaces]]
n = 6
name = "6"

[[workspaces]]
n = 7
name = "7"

[[workspaces]]
n = 8
name = "8"

[[workspaces]]
n = 9
name = "9"

[[workspaces]]
n = 10
name = "MISC"

# ===== Monitors (multi-monitor setup) =====
# Привязка workspaces к конкретным мониторам (как в Hyprland).
# Если мониторов несколько — каждый имеет свой набор workspaces.
# Если конфиг пустой — все workspaces на primary monitor.

[[monitors]]
connector = "eDP-1"          # встроенный экран ноутбука
workspaces = [1, 3, 5, 7, 9] # нечётные
enabled = true
position = "primary"

[[monitors]]
connector = "HDMI-A-1"       # внешний HDMI
workspaces = [2, 4, 6, 8, 10] # чётные
enabled = true
position = "right-of eDP-1"

# [[monitors]]
# connector = "DP-1"
# workspaces = [1, 2, 3]
# resolution = [2560, 1440]
# refresh_rate = 144
# enabled = true
# position = "left-of eDP-1"

# ===== Window rules =====
# Автоматическое размещение окон по правилам (при CreateNotify в X11).
# Все непустые поля match_* должны совпасть (AND). Поле regex включает regex-матчинг.
[[window_rules]]
match_class = "Steam"
workspace = 5                  # Steam games → workspace 5 (MEDIA)
focus = true
fullscreen = false

[[window_rules]]
match_class = "firefox"
workspace = 2                  # браузер → WEB

[[window_rules]]
match_class = "discord"
workspace = 4                  # Discord → CHAT
focus = true

[[window_rules]]
match_class = "Gimp"
workspace = 5
size = [80, 80]                # 80% ширины и высоты
position = [10, 10]

[[window_rules]]
match_class = "Spotify"
workspace = 5

# ===== Autostart =====
# Команды запускаемые при старте WM (после login).
# type: "x11" (графическая), "terminal" (в нашем терминале), "command" (фоновый процесс)
[[autostart]]
type = "command"
cmd = "pipewire"
delay_ms = 0

[[autostart]]
type = "command"
cmd = "pipewire-pulse"
delay_ms = 500

[[autostart]]
type = "command"
cmd = "wireplumber"
delay_ms = 1000

[[autostart]]
type = "x11"
cmd = "firefox"
args = []
delay_ms = 2000
workspace = 2                  # открыть на workspace 2 (WEB)

[[autostart]]
type = "x11"
cmd = "discord"
args = []
delay_ms = 3000
workspace = 4                  # открыть на workspace 4 (CHAT)

[[autostart]]
type = "terminal"
cmd = "htop"
args = []
delay_ms = 0
workspace = 1                  # открыть на workspace 1 (MAIN)

# ===== Popups =====
[popups]
duration_frames = 240          # 4 секунды при 60fps
max_width_pct = 67
glitch_border = true
# font = "Lat2-Terminus16"     # optional override

