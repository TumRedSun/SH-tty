# superhot-tty v0.3 configuration file.
#
# Place at: ~/.config/SH-tty/config.toml (XDG) or /etc/SH-tty/config.toml (system-wide)
#
# Все биндинги и настройки задаются здесь. Нет захардкоженных значений.

[general]
shell = "zsh"
font = "Lat2-Terminus16"
font_size = 16
gap = 4
border = 1
outer_padding = 4
status_bar_height = 24
framerate = 60
glitch_intensity = 0.15
workspace_count = 10  # 1..9 + 0=10

[theme]
bg = "#0A0716"
tile_bg_inactive = "#120E24"
tile_bg_active = "#0F0A1E"
border_inactive = "#3A2D5C"
border_active = "#FF2E97"
border_x11 = "#00F0FF"
fg_default = "#E6E1F0"
fg_dim = "#7A6F96"
accent_magenta = "#FF2E97"
accent_cyan = "#00F0FF"
popup_bg = "#140B2E"
popup_border = "#FF2E97"
error = "#FF4D4D"

# ===== Login screen =====
[login]
# Title — large center text (like SHMCD "MORE"). Empty → use language default.
title = ""
subtitle = ""
language = "en"            # "en" → "MORE" / "SUPERHOT TTY", "ru" → "БОЛЬШЕ" / "СУПЕРХОТ TTY"
show_clock = true
show_hint = true
pam_service = "login"
auto_start_session = true
# title_color = "#FF2E97"  # optional override (default = theme.accent_magenta)
# title_font = ""          # optional override (default = general.font)

# ===== Workspaces =====
# 10 workspaces (1..9 + 0=10). Каждый может иметь имя и on_init команду.
[[workspaces]]
n = 1
name = "MAIN"

[[workspaces]]
n = 2
name = "WEB"

[[workspaces]]
n = 3
name = "DEV"

[[workspaces]]
n = 4
name = "CHAT"

[[workspaces]]
n = 5
name = "MEDIA"

[[workspaces]]
n = 6
name = "6"

[[workspaces]]
n = 7
name = "7"

[[workspaces]]
n = 8
name = "8"

[[workspaces]]
n = 9
name = "9"

[[workspaces]]
n = 10
name = "MISC"

# ===== Monitors (multi-monitor setup) =====
# Привязка workspaces к конкретным мониторам (как в Hyprland).
# Если мониторов несколько — каждый имеет свой набор workspaces.
# Если конфиг пустой — все workspaces на primary monitor.

[[monitors]]
connector = "eDP-1"          # встроенный экран ноутбука
workspaces = [1, 3, 5, 7, 9] # нечётные
enabled = true
position = "primary"

[[monitors]]
connector = "HDMI-A-1"       # внешний HDMI
workspaces = [2, 4, 6, 8, 10] # чётные
enabled = true
position = "right-of eDP-1"

# [[monitors]]
# connector = "DP-1"
# workspaces = [1, 2, 3]
# resolution = [2560, 1440]
# refresh_rate = 144
# enabled = true
# position = "left-of eDP-1"

# ===== Window rules =====
# Автоматическое размещение окон по правилам (при CreateNotify в X11).
# Все непустые поля match_* должны совпасть (AND). Поле regex включает regex-матчинг.
[[window_rules]]
match_class = "Steam"
workspace = 5                  # Steam games → workspace 5 (MEDIA)
focus = true
fullscreen = false

[[window_rules]]
match_class = "firefox"
workspace = 2                  # браузер → WEB

[[window_rules]]
match_class = "discord"
workspace = 4                  # Discord → CHAT
focus = true

[[window_rules]]
match_class = "Gimp"
workspace = 5
size = [80, 80]                # 80% ширины и высоты
position = [10, 10]

[[window_rules]]
match_class = "Spotify"
workspace = 5

# ===== Autostart =====
# Команды запускаемые при старте WM (после login).
# type: "x11" (графическая), "terminal" (в нашем терминале), "command" (фоновый процесс)
[[autostart]]
type = "command"
cmd = "pipewire"
delay_ms = 0

[[autostart]]
type = "command"
cmd = "pipewire-pulse"
delay_ms = 500

[[autostart]]
type = "command"
cmd = "wireplumber"
delay_ms = 1000

[[autostart]]
type = "x11"
cmd = "firefox"
args = []
delay_ms = 2000
workspace = 2                  # открыть на workspace 2 (WEB)

[[autostart]]
type = "x11"
cmd = "discord"
args = []
delay_ms = 3000
workspace = 4                  # открыть на workspace 4 (CHAT)

[[autostart]]
type = "terminal"
cmd = "htop"
args = []
delay_ms = 0
workspace = 1                  # открыть на workspace 1 (MAIN)

# ===== Popups =====
[popups]
duration_frames = 240          # 4 секунды при 60fps
max_width_pct = 67
glitch_border = true
# font = "Lat2-Terminus16"     # optional override

# ===== Key bindings =====
# Все биндинги в конфиге. Нет захардкоженных.
# mods: Super, Ctrl, Alt, Shift
# key:  any key (a-z, 0-9, Return, Space, Tab, Left, Right, Up, Down, F1-F12)

# Launcher
[[keybindings]]
key = "d"
mods = ["Super"]
action = { type = "launcher" }

# Terminal
[[keybindings]]
key = "Return"
mods = ["Super"]
action = { type = "terminal" }

[[keybindings]]
key = "v"
mods = ["Super"]
action = { type = "split_vertical" }

# Focus navigation
[[keybindings]]
key = "h"
mods = ["Super"]
action = { type = "focus", dir = "left" }

[[keybindings]]
key = "j"
mods = ["Super"]
action = { type = "focus", dir = "down" }

[[keybindings]]
key = "k"
mods = ["Super"]
action = { type = "focus", dir = "up" }

[[keybindings]]
key = "l"
mods = ["Super"]
action = { type = "focus", dir = "right" }

# Move window
[[keybindings]]
key = "h"
mods = ["Super", "Shift"]
action = { type = "move", dir = "left" }

[[keybindings]]
key = "j"
mods = ["Super", "Shift"]
action = { type = "move", dir = "down" }

[[keybindings]]
key = "k"
mods = ["Super", "Shift"]
action = { type = "move", dir = "up" }

[[keybindings]]
key = "l"
mods = ["Super", "Shift"]
action = { type = "move", dir = "right" }

# Swap
[[keybindings]]
key = "h"
mods = ["Super", "Ctrl"]
action = { type = "swap", dir = "left" }

[[keybindings]]
key = "j"
mods = ["Super", "Ctrl"]
action = { type = "swap", dir = "down" }

[[keybindings]]
key = "k"
mods = ["Super", "Ctrl"]
action = { type = "swap", dir = "up" }

[[keybindings]]
key = "l"
mods = ["Super", "Ctrl"]
action = { type = "swap", dir = "right" }

# Resize
[[keybindings]]
key = "r"
mods = ["Super"]
action = { type = "resize_mode" }

[[keybindings]]
key = "h"
mods = ["Super", "Alt"]
action = { type = "resize", dir = "left", delta = 0.05 }

[[keybindings]]
key = "j"
mods = ["Super", "Alt"]
action = { type = "resize", dir = "down", delta = 0.05 }

[[keybindings]]
key = "k"
mods = ["Super", "Alt"]
action = { type = "resize", dir = "up", delta = 0.05 }

[[keybindings]]
key = "l"
mods = ["Super", "Alt"]
action = { type = "resize", dir = "right", delta = 0.05 }

# Window management
[[keybindings]]
key = "q"
mods = ["Super"]
action = { type = "close" }

[[keybindings]]
key = "f"
mods = ["Super"]
action = { type = "fullscreen" }

[[keybindings]]
key = "space"
mods = ["Super"]
action = { type = "cycle_focus" }

[[keybindings]]
key = "w"
mods = ["Super"]
action = { type = "toggle_layout" }

# Workspaces 1..9 + 0=10
[[keybindings]]
key = "1"
mods = ["Super"]
action = { type = "workspace", n = 1 }

[[keybindings]]
key = "2"
mods = ["Super"]
action = { type = "workspace", n = 2 }

[[keybindings]]
key = "3"
mods = ["Super"]
action = { type = "workspace", n = 3 }

[[keybindings]]
key = "4"
mods = ["Super"]
action = { type = "workspace", n = 4 }

[[keybindings]]
key = "5"
mods = ["Super"]
action = { type = "workspace", n = 5 }

[[keybindings]]
key = "6"
mods = ["Super"]
action = { type = "workspace", n = 6 }

[[keybindings]]
key = "7"
mods = ["Super"]
action = { type = "workspace", n = 7 }

[[keybindings]]
key = "8"
mods = ["Super"]
action = { type = "workspace", n = 8 }

[[keybindings]]
key = "9"
mods = ["Super"]
action = { type = "workspace", n = 9 }

[[keybindings]]
key = "0"
mods = ["Super"]
action = { type = "workspace", n = 10 }

# Move window to workspace
[[keybindings]]
key = "1"
mods = ["Super", "Shift"]
action = { type = "move_to_workspace", n = 1 }

[[keybindings]]
key = "2"
mods = ["Super", "Shift"]
action = { type = "move_to_workspace", n = 2 }

[[keybindings]]
key = "3"
mods = ["Super", "Shift"]
action = { type = "move_to_workspace", n = 3 }

[[keybindings]]
key = "4"
mods = ["Super", "Shift"]
action = { type = "move_to_workspace", n = 4 }

[[keybindings]]
key = "5"
mods = ["Super", "Shift"]
action = { type = "move_to_workspace", n = 5 }

[[keybindings]]
key = "6"
mods = ["Super", "Shift"]
action = { type = "move_to_workspace", n = 6 }

[[keybindings]]
key = "7"
mods = ["Super", "Shift"]
action = { type = "move_to_workspace", n = 7 }

[[keybindings]]
key = "8"
mods = ["Super", "Shift"]
action = { type = "move_to_workspace", n = 8 }

[[keybindings]]
key = "9"
mods = ["Super", "Shift"]
action = { type = "move_to_workspace", n = 9 }

[[keybindings]]
key = "0"
mods = ["Super", "Shift"]
action = { type = "move_to_workspace", n = 10 }

# X11 spawn
[[keybindings]]
key = "e"
mods = ["Super"]
action = { type = "spawn_x11", cmd = "xterm", args = [] }

# Popup example — show script output in popup
[[keybindings]]
key = "p"
mods = ["Super"]
action = { type = "popup_script", cmd = "echo", args = ["Hello from SuperHot TTY!"] }

# Reload config
[[keybindings]]
key = "r"
mods = ["Super", "Ctrl"]
action = { type = "reload" }

# Quit
[[keybindings]]
key = "e"
mods = ["Super", "Shift"]
action = { type = "quit" }

# ===== Launcher =====
[launcher]
max_rows = 12
x11_display = ":1"
terminal_shell = "zsh"
desktop_paths = [
    "/usr/share/applications",
    "/usr/local/share/applications",
    "~/.local/share/applications",
]

[launcher.custom_entries]
"terminal: bash" = "bash"
"reload config" = "superhot-tty-reload"

# ===== Audio (PipeWire) =====
[audio]
start_pipewire_pulse = true
start_wireplumber = true
default_volume = 70

# ===== Portal (screen share) =====
[portal]
start_portal = true
service_name = "org.freedesktop.impl.portal.desktop.SuperHot"
object_path = "/org/freedesktop/portal/desktop"

# ===== Gamepad =====
[gamepad]
enabled = true
steam_passthrough = true
stick_sensitivity = 50

[gamepad.keymap]
"a" = "Return"
"b" = "Escape"
"x" = "space"
"y" = "Tab"
"dpad_up" = "k"
"dpad_down" = "j"
"dpad_left" = "h"
"dpad_right" = "l"
"start" = "Super"
"back" = "Super"
"left_shoulder" = "bracketleft"
"right_shoulder" = "bracketright"

# ===== X11 =====
[x11]
dri3 = true
display = ":1"
screen_size = [1920, 1080]
xtest_input = true
hardware_cursor = true
auto_place_windows = true
overlay_planes = true              # 0% CPU для X11 окон через hardware overlay planes
