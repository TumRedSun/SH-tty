# superhot-tty configuration file.
# Place at /etc/superhot-tty/config.toml or ~/.config/superhot-tty/config.toml

[general]
shell = "zsh"
font = "Lat2-Terminus16"
font_size = 16
gap = 4
border = 1
outer_padding = 4
status_bar_height = 24
framerate = 60
# 0.0 — без глитчей, 1.0 — максимум. MCD-стиль: 0.15.
glitch_intensity = 0.15

[theme]
bg = "#0A0716"
tile_bg_inactive = "#120E24"
tile_bg_active = "#0F0A1E"
border_inactive = "#3A2D5C"
border_active = "#FF2E97"
border_x11 = "#00F0FF"
fg_default = "#E6E1F0"
fg_dim = "#7A6F96"
accent_magenta = "#FF2E97"
accent_cyan = "#00F0FF"
popup_bg = "#140B2E"
popup_border = "#FF2E97"
error = "#FF4D4D"

# ===== Workspaces =====
[[workspaces]]
n = 1
name = "MAIN"

[[workspaces]]
n = 2
name = "WEB"

[[workspaces]]
n = 3
name = "DEV"

[[workspaces]]
n = 4
name = "CHAT"

[[workspaces]]
n = 5
name = "MEDIA"

[[workspaces]]
n = 6
name = "6"

[[workspaces]]
n = 7
name = "7"

[[workspaces]]
n = 8
name = "8"

[[workspaces]]
n = 9
name = "9"

# ===== Key bindings =====
# mods: Super, Ctrl, Alt, Shift
# key:  any key name (a-z, 0-9, Return, Space, Tab, Left, Right, Up, Down, F1-F12, etc.)

[[keybindings]]
key = "Return"
mods = ["Super"]
action = { type = "terminal" }

